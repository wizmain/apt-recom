name: Quarterly Facility Data Batch

on:
  schedule:
    - cron: '0 18 1 1,4,7,10 *'  # 1/4/7/10월 1일 18:00 UTC (한국 03:00)
  workflow_dispatch:

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 상가(5단계)·심평원 병원(6단계) 수집 추가로 상향
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install psycopg2-binary requests python-dotenv pandas scikit-learn numpy
      - name: Run quarterly batch
        run: python -m batch.run --type quarterly
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          # 상가 수집(5단계)은 SECONDARY 전용(PRIMARY 403), THIRD 는 429 로테이션 풀
          DATA_GO_KR_API_SECONDARY_KEY: ${{ secrets.DATA_GO_KR_API_SECONDARY_KEY }}
          DATA_GO_KR_API_THIRD_KEY: ${{ secrets.DATA_GO_KR_API_THIRD_KEY }}
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          # 8단계(NEIS 학원, Phase 2-5) — 없으면 빈 키로 조용히 실패(요청 자체가 안 됨)
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
