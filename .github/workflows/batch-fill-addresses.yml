name: Fill Missing Apartment Addresses

on:
  schedule:
    - cron: '0 16 * * *'  # 매일 16:00 UTC (한국 01:00) — 주소 보충 완료 시 비활성화
  workflow_dispatch:

jobs:
  fill-addresses:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install psycopg2-binary requests python-dotenv
      - name: Run Phase 2 - Building Registry API (max 950 calls)
        run: python -m batch.fill_addresses --phase 2 --max-calls 950
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
