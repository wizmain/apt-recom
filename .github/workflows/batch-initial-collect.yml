name: Initial Nationwide Trade Collection

on:
  schedule:
    - cron: '0 15 * * *'  # 매일 15:00 UTC (한국 00:00) — 초기 수집 완료 시 비활성화
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install psycopg2-binary requests python-dotenv pandas
      - name: Run initial collection (max 900 calls)
        run: python -m batch.initial_collect --max-calls 900
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
