name: Trade Data Batch (12h)

on:
  schedule:
    - cron: '0 3,15 * * *'  # 매일 03:00/15:00 UTC (한국 12:00/00:00)
  workflow_dispatch:

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install psycopg2-binary requests python-dotenv pandas joblib numpy scikit-learn
      - name: Run trade batch
        run: python -m batch.run --type trade
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          # 신규 아파트 건축물대장 즉시 등록(6b)의 429 키 로테이션 풀
          DATA_GO_KR_API_SECONDARY_KEY: ${{ secrets.DATA_GO_KR_API_SECONDARY_KEY }}
          DATA_GO_KR_API_THIRD_KEY: ${{ secrets.DATA_GO_KR_API_THIRD_KEY }}
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
