name: Management Cost Batch (manual only)

# 정기 스케줄 중지 (2026-06): 관리비는 자료실 xlsx 로컬 수동 적재
# (collect_mgmt_cost --source xlsx)로 전환. API 는 월 총액(sUse)만 제공해
# 50개 상세 항목을 못 채움. 이 API 워크플로는 수동 폴백용으로만 유지.
on:
  workflow_dispatch:

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install psycopg2-binary requests python-dotenv
      - name: Run mgmt cost batch
        run: python -m batch.run --type mgmt_cost
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
