name: K-APT Info Refresh (Monthly)

on:
  schedule:
    - cron: '0 18 1 * *'  # 매월 1일 18:00 UTC (한국 03:00)
  workflow_dispatch:

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install psycopg2-binary requests python-dotenv
      - name: Run K-APT refresh
        run: python -m batch.run --type kapt_refresh
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
