name: Annual Population & Crime Batch

on:
  schedule:
    - cron: '0 19 15 1 *'  # 1월 15일 19:00 UTC (한국 04:00)
  workflow_dispatch:

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install psycopg2-binary requests python-dotenv pandas
      - name: Run annual batch
        run: python -m batch.run --type annual
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
